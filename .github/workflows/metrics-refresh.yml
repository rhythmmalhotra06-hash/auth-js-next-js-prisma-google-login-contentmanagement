name: Ticket metrics refresh

# Recomputes the lifetime ticket-status snapshot (e.g. all-time Shipped count) by
# scanning the Airtable ticket table once and persisting the tally to Postgres, so
# dashboards (Studio, Performance) read one cheap row instead of scanning ~10k rows
# on every load. Safe to run on a schedule — it only writes the metric_snapshots
# table (no app-owned ticket state is touched).
#
# ⚠️ BLOCKED ON IAP — READ BEFORE ENABLING THE SCHEDULE ⚠️
# The deployed Cloud Run service is behind Google Identity-Aware Proxy (IAP). A plain
# bearer curl is rejected by IAP before it reaches the app, so this job CANNOT
# succeed from GitHub until it authenticates to IAP with a Google-issued OIDC ID
# token. To enable (same setup as reference-sync.yml):
#   1. Obtain a service account with the "IAP-secured Web App User" role on this
#      service, plus the IAP OAuth client ID (the token "audience").
#   2. Store the SA key as secret GCP_SA_KEY and the audience as var IAP_AUDIENCE.
#   3. Add a google-github-actions/auth step to mint an ID token and send it as the
#      Authorization header (SYNC_SECRET then becomes a second factor in the app).
#   4. Re-enable the `schedule:` trigger below.
# Until then this workflow is manual-only (workflow_dispatch) and will fail if the
# IAP auth step is not present — that's expected.

on:
  # schedule:
  #   - cron: '0 3 * * *'   # 03:00 UTC daily — ENABLE ONLY AFTER IAP AUTH IS WIRED (see header)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger metrics refresh
        env:
          APP_URL: ${{ vars.APP_URL || 'https://auth-js-next-js-prisma-google-login-cont-73a7-jdtcvngavq-uc.a.run.app' }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "::error::SYNC_SECRET is not set in repo secrets"; exit 1
          fi
          echo "POST $APP_URL/api/metrics/refresh"
          # TODO(IAP): add a Google OIDC ID token here once GCP_SA_KEY / IAP_AUDIENCE exist.
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "$APP_URL/api/metrics/refresh" \
            -H "Authorization: Bearer $SYNC_SECRET")
          echo "HTTP $HTTP"; cat /tmp/resp.json; echo
          if [ "$HTTP" != "200" ]; then echo "::error::refresh failed (HTTP $HTTP) — likely IAP; see workflow header"; exit 1; fi
