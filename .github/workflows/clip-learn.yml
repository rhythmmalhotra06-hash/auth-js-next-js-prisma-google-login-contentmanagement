name: Clip learning loop

# Tier-2 of the clip-agent learning loop: once a week, read the outcome signals
# (Rating / Released / 24 Data) that the native "(Sync)" mirror carries for released
# clips, ask the engine to propose a few generalizable clip-generation rules, and write
# them as INACTIVE "Proposed from performance" Clip Rules for an admin to approve in
# Settings → Clip Rules. Nothing goes live without human approval (propose→approve).
#
#   POST /api/clips/learn   — Bearer-gated (SYNC_SECRET); idempotent-ish (won't
#                             duplicate rules already active or already proposed).
#
# The app is public (IAP removed 2026-07-03), so a plain bearer curl reaches the route
# — no OIDC needed. SYNC_SECRET is a repo secret; APP_URL is a repo variable. Same
# convention as ticket-sync.yml / reference-sync.yml.

on:
  schedule:
    - cron: '0 3 * * 1' # 03:00 UTC every Monday
  workflow_dispatch: {}

concurrency:
  group: clip-learn
  cancel-in-progress: false

jobs:
  learn:
    runs-on: ubuntu-latest
    steps:
      - name: Propose clip learnings from performance signals
        env:
          APP_URL: ${{ vars.APP_URL || 'https://auth-js-next-js-prisma-google-login-cont-73a7-jdtcvngavq-as.a.run.app' }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "::error::SYNC_SECRET is not set in repo secrets"; exit 1
          fi
          echo "→ POST $APP_URL/api/clips/learn"
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "$APP_URL/api/clips/learn" \
            -H "Authorization: Bearer $SYNC_SECRET")
          echo "HTTP $code"; cat /tmp/resp.json; echo
          if [ "$code" != "200" ]; then echo "::error::/api/clips/learn returned HTTP $code"; exit 1; fi
