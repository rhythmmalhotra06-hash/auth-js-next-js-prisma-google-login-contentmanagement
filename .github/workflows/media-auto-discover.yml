# Vishen media auto-discover — scheduled poll of the discover / slack-scan / clip-convert
# endpoints. IAP removed 2026-07-03 (service public + co-located with the DB), so a plain
# call with the shared secret reaches the app — no OIDC / Workload Identity needed.
#
# Required repo secret (Settings → Secrets and variables → Actions):
#   DISCOVER_SHARED_SECRET  — same value as the Kessel env secret (sent as x-discover-secret)
# Optional repo variable:
#   DISCOVER_BASE_URL       — defaults to the prod service URL below

name: media-auto-discover

on:
  schedule:
    - cron: '0 * * * *' # hourly; adjust as needed
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  discover:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.DISCOVER_BASE_URL || 'https://auth-js-next-js-prisma-google-login-cont-73a7-jdtcvngavq-as.a.run.app' }}
    steps:
      - name: Trigger discover + slack-scan
        env:
          DISCOVER_SECRET: ${{ secrets.DISCOVER_SHARED_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${DISCOVER_SECRET}" ]; then
            echo "::error::DISCOVER_SHARED_SECRET is not set in repo secrets"; exit 1
          fi
          call() {
            local path="$1"
            echo "→ POST $path"
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST "${BASE_URL}${path}" \
              -H "x-discover-secret: ${DISCOVER_SECRET}" \
              -H "Content-Type: application/json")
            echo "HTTP ${code}"; cat /tmp/resp.json; echo
            test "${code}" = "200"
          }
          call /api/media/discover
          # Vishen's Major Videos base → Media Sources (rows with a video link, created after cutoff).
          call /api/media/sync-major-videos
          # Slack channel scan (Phase 2). Harmless no-op until SLACK_* env is set on the service.
          call /api/media/slack-scan || echo "slack-scan not configured yet — skipping"
          # Airtable checkbox → ticket: convert clips ticked "Create Ticket".
          call /api/clips/convert
