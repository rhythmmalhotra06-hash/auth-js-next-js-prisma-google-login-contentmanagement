name: Airtable reference sync

# One-way pull of REFERENCE data (employees, asset types, event types,
# dimensions, calendars, authors) from Airtable → Postgres. Safe to run on a
# schedule because reference data is read-only in the app.
#
# NOTE: this intentionally does NOT run the historical ticket/asset migration
# (POST /api/sync/history). That import overwrites app-owned ticket state
# (status, queue order, assignee) and must stay a deliberate, manual one-time
# backfill until proper two-way sync exists.
#
# ⚠️ BLOCKED ON IAP — READ BEFORE ENABLING THE SCHEDULE ⚠️
# The deployed Cloud Run service is behind Google Identity-Aware Proxy (IAP).
# A plain bearer curl is rejected by IAP ("Invalid IAP credentials") before it
# reaches the app, so this job CANNOT succeed from GitHub until it authenticates
# to IAP with a Google-issued OIDC ID token. To enable:
#   1. Obtain (from the platform/GCP team) a service account with the
#      "IAP-secured Web App User" role on this service, plus the IAP OAuth
#      client ID (the token "audience").
#   2. Store the SA key as secret GCP_SA_KEY and the audience as var IAP_AUDIENCE.
#   3. Add a google-github-actions/auth step to mint an ID token and send it as
#      the Authorization header (the SYNC_SECRET then becomes a second factor
#      checked by the app itself).
#   4. Re-enable the `schedule:` trigger below.
# Until then this workflow is manual-only (workflow_dispatch) and will fail if
# the IAP auth step is not present — that's expected.

on:
  # schedule:
  #   - cron: '0 2 * * *'   # 02:00 UTC daily — ENABLE ONLY AFTER IAP AUTH IS WIRED (see header)
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (fetch + map, no DB writes)'
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reference sync
        env:
          APP_URL: ${{ vars.APP_URL || 'https://auth-js-next-js-prisma-google-login-cont-73a7-jdtcvngavq-uc.a.run.app' }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
          DRY_RUN: ${{ github.event.inputs.dryRun }}
        run: |
          if [ -z "$SYNC_SECRET" ]; then
            echo "::error::SYNC_SECRET is not set in repo secrets"; exit 1
          fi
          QS=""
          if [ "$DRY_RUN" = "true" ]; then QS="?dryRun=true"; fi
          echo "POST $APP_URL/api/sync/reference$QS"
          # TODO(IAP): add a Google OIDC ID token here once GCP_SA_KEY / IAP_AUDIENCE exist.
          HTTP=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "$APP_URL/api/sync/reference$QS" \
            -H "Authorization: Bearer $SYNC_SECRET")
          echo "HTTP $HTTP"; cat /tmp/resp.json; echo
          if [ "$HTTP" != "200" ]; then echo "::error::sync failed (HTTP $HTTP) — likely IAP; see workflow header"; exit 1; fi
