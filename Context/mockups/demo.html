:root{
  --brand:#572280; --brand-bright:#6d34a0; --brand-content:#3f1860; --brand-strong:#3f1860;
  --brand-soft:#f1eaf7; --brand-border:#e3d4f0;
  --gold:#f5b000; --gold-bright:#ffc62e; --gold-content:#6b4e00; --gold-soft:#fff6e0;
  --green:#159f65; --green-content:#0e6742; --green-soft:#e8f9f1;
  --blue:#2563cf; --blue-content:#1c3bd4; --blue-soft:#ebf2ff;
  --amber:#c9801a; --amber-content:#7a5600; --amber-soft:#fff4d9;
  --red:#dc2626; --red-content:#8a1f1f; --red-soft:#ffe4e4;
  --g100:#faf9fc; --g150:#f4f2f8; --g200:#ece9f1; --g300:#d8d3e0;
  --g400:#a59db4; --g500:#6b6478; --g600:#463f54; --g700:#1a1523;
  --bg:#ffffff; --bg-muted:#faf9fc; --bg-subtle:#f4f2f8; --surface:#ffffff; --surface-2:#ffffff;
  --text:#1a1523; --text-muted:#6b6478; --text-subtle:#a59db4; --text-disabled:#c5bfd0; --text-inv:#fff; --link:#572280;
  --border:rgba(40,20,60,.12); --border-strong:rgba(40,20,60,.22); --border-muted:rgba(40,20,60,.06);
  --ring:#6d34a0;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-full:9999px;
  --sh-1:0 1px 2px 0 rgba(40,20,60,.06),0 4px 12px 0 rgba(40,20,60,.05);
  --sh-2:0 4px 16px 0 rgba(40,20,60,.10);
  --sh-3:0 16px 40px 0 rgba(40,20,60,.18);
  --ease:cubic-bezier(.2,0,0,1);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  --font-display:'Bricolage Grotesque',-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
  /* event-tier tints (from mockups) */
  --tier-high-bg:#eeedfe; --tier-high-ink:#3c3489;
  --tier-mid-bg:#e1f5ee;  --tier-mid-ink:#085041;
  --tier-soc-bg:#fbeaf0;  --tier-soc-ink:#72243e;
  --tier-low-bg:#f1efe8;  --tier-low-ink:#444441;
}
[data-theme="dark"]{
  --brand:#b98fe0; --brand-bright:#cda9ec; --brand-content:#e9dcf6; --brand-strong:#cda9ec;
  --brand-soft:#2a1c3a; --brand-border:#3d2c52;
  --gold-soft:#2e2410; --green-soft:#11291f; --blue-soft:#14233f; --amber-soft:#2e2410; --red-soft:#2e1414;
  --green-content:#5fd6a3; --blue-content:#86b1ff; --amber-content:#e3a850; --red-content:#f08a8a; --gold-content:#f0c75a;
  --bg:#15101d; --bg-muted:#110c18; --bg-subtle:#1f1730; --surface:#1b1426; --surface-2:#241a33;
  --text:#f3eefa; --text-muted:#b3a9c4; --text-subtle:#877c99; --text-disabled:#5b5170; --text-inv:#1a1523; --link:#b98fe0;
  --border:rgba(200,180,230,.14); --border-strong:rgba(200,180,230,.26); --border-muted:rgba(200,180,230,.07);
  --g150:#241a33; --g200:#2a2038;
  --sh-1:0 1px 2px 0 rgba(0,0,0,.5),0 4px 12px 0 rgba(0,0,0,.4);
  --sh-2:0 4px 16px 0 rgba(0,0,0,.55); --sh-3:0 20px 40px 0 rgba(0,0,0,.65);
  --tier-high-bg:#2c2350; --tier-high-ink:#c3b6f4;
  --tier-mid-bg:#10342a;  --tier-mid-ink:#6fd9b6;
  --tier-soc-bg:#3a1b29;  --tier-soc-ink:#e79bb6;
  --tier-low-bg:#2a2820;  --tier-low-ink:#bdb8a6;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--text);background:var(--bg-muted);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
h1,h2,h3,h4{margin:0;font-weight:600;text-wrap:balance;font-family:var(--font-display);letter-spacing:-.015em;}
a{color:var(--link);text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
table{border-collapse:collapse;width:100%;}
::selection{background:var(--brand-soft);}
:focus-visible{outline:2px solid var(--ring);outline-offset:2px;border-radius:4px;}
input,select,textarea{font-family:inherit;font-size:13px;width:100%;padding:8px 10px;color:var(--text);
  border:1px solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(109,52,160,.18);}
label{font-size:12px;font-weight:500;color:var(--text-muted);display:block;margin-bottom:5px;}

/* ---------- shell ---------- */
.app{display:flex;min-height:100vh;}
.side{width:236px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:16px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;}
.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#fff;display:flex;
  align-items:center;justify-content:center;font-weight:700;font-size:15px;position:relative;flex-shrink:0;}
.brand-mark::after{content:"";position:absolute;top:-2px;right:-2px;width:9px;height:9px;border-radius:50%;
  background:var(--gold);border:2px solid var(--surface);}
.brand-txt{display:flex;flex-direction:column;line-height:1.15;}
.brand-txt b{font-size:13.5px;font-weight:700;font-family:var(--font-display);letter-spacing:-.01em;}
.brand-txt span{font-size:11px;color:var(--text-subtle);}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);
  padding:14px 11px 5px;}
.nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r-sm);cursor:pointer;
  font-size:13.5px;color:var(--text-muted);border:none;background:transparent;width:100%;text-align:left;
  transition:background var(--ease) .12s,color var(--ease) .12s;}
.nav:hover{background:var(--bg-subtle);color:var(--text);}
.nav.active{background:var(--brand-soft);color:var(--brand-content);font-weight:600;box-shadow:inset 2px 0 0 var(--brand);}
.nav svg{width:18px;height:18px;flex-shrink:0;}
.nav .pip{margin-left:auto;font-size:10px;font-weight:600;background:var(--gold-soft);color:var(--gold-content);
  padding:1px 7px;border-radius:var(--r-full);}
.nav-tour{color:var(--brand-content);} .nav-tour svg{color:var(--brand);}
.nav-tour:hover{background:var(--brand-soft);color:var(--brand-content);}
.side-foot{margin-top:auto;padding:10px 8px 2px;border-top:1px solid var(--border);font-size:11px;color:var(--text-subtle);
  display:flex;align-items:center;gap:6px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  padding:12px 26px;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--border);}
.tb-title{display:flex;flex-direction:column;line-height:1.2;min-width:0;}
.tb-title b{font-size:16px;font-weight:600;font-family:var(--font-display);letter-spacing:-.01em;}
.tb-title span{font-size:12px;color:var(--text-muted);}
.tb-spacer{flex:1;}
.content{padding:22px 26px 64px;max-width:1180px;width:100%;margin:0 auto;}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;line-height:1;
  padding:8px 13px;border-radius:var(--r-sm);border:1px solid var(--border-strong);background:var(--surface);
  color:var(--text);cursor:pointer;transition:background var(--ease) .12s,border-color var(--ease) .12s,transform .05s;white-space:nowrap;}
.btn:hover{background:var(--bg-subtle);}
.btn:active{transform:translateY(.5px);}
.btn svg{width:15px;height:15px;}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;}
.btn.primary:hover{background:var(--brand-bright);border-color:var(--brand-bright);}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#3b2a00;}
.btn.gold:hover{background:var(--gold-bright);}
.btn.ghost{border-color:transparent;background:transparent;}
.btn.ghost:hover{background:var(--bg-subtle);}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn.block{width:100%;justify-content:center;}
.btn[disabled]{opacity:.5;cursor:not-allowed;}

/* ---------- pills / badges ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:3px 9px;
  border-radius:var(--r-sm);white-space:nowrap;}
.badge .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.b-neutral{background:var(--bg-subtle);color:var(--text-muted);} .b-neutral .dot{background:var(--text-subtle);}
.b-brand{background:var(--brand-soft);color:var(--brand-content);} .b-brand .dot{background:var(--brand);}
.b-success{background:var(--green-soft);color:var(--green-content);} .b-success .dot{background:var(--green);}
.b-info{background:var(--blue-soft);color:var(--blue-content);} .b-info .dot{background:var(--blue);}
.b-warning{background:var(--amber-soft);color:var(--amber-content);} .b-warning .dot{background:var(--amber);}
.b-danger{background:var(--red-soft);color:var(--red-content);} .b-danger .dot{background:var(--red);}
.b-gold{background:var(--gold-soft);color:var(--gold-content);} .b-gold .dot{background:var(--gold);}
.tier{font-size:11.5px;font-weight:600;padding:1px 8px;border-radius:var(--r-sm);}
.tier.high{background:var(--tier-high-bg);color:var(--tier-high-ink);}
.tier.mid{background:var(--tier-mid-bg);color:var(--tier-mid-ink);}
.tier.soc{background:var(--tier-soc-bg);color:var(--tier-soc-ink);}
.tier.low{background:var(--tier-low-bg);color:var(--tier-low-ink);}

.avatar{width:24px;height:24px;border-radius:50%;background:var(--brand-soft);color:var(--brand-content);
  display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.who{display:inline-flex;align-items:center;gap:7px;}

/* ---------- cards / grids ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--sh-1);}
.pad{padding:18px;}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;}
.kpi .lab{font-size:12.5px;color:var(--text-muted);display:flex;align-items:center;gap:6px;}
.kpi .val{font-size:29px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums;
  font-family:var(--font-display);letter-spacing:-.02em;line-height:1.05;}
.kpi .sub{font-size:11.5px;color:var(--text-subtle);margin-top:1px;}
.kpi.alert .val{color:var(--gold-content);} .kpi.danger .val{color:var(--red);}
.kpi.clickable{cursor:pointer;transition:border-color var(--ease) .12s,box-shadow var(--ease) .12s;}
.kpi.clickable:hover{border-color:var(--brand-border);box-shadow:var(--sh-1);}

.sec-head{display:flex;align-items:center;gap:10px;margin:26px 0 12px;}
.sec-head h3{font-size:15px;}
.sec-head .hint{font-size:12px;color:var(--text-subtle);}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--brand);}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.toolbar input{flex:1;min-width:200px;}
.toolbar select{width:auto;min-width:130px;}

/* ---------- table ---------- */
.tw{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;background:var(--surface);}
.tscroll{overflow-x:auto;}
table.list{font-size:13px;min-width:760px;}
table.list thead th{background:var(--bg-subtle);color:var(--text-muted);text-align:left;font-weight:600;
  font-size:11.5px;letter-spacing:.02em;padding:10px 10px;text-transform:uppercase;}
table.list tbody td{padding:11px 10px;border-top:1px solid var(--border);vertical-align:middle;}
table.list tbody tr{cursor:pointer;transition:background var(--ease) .1s;}
table.list tbody tr:hover{background:var(--bg-subtle);}
table.list tbody tr.attn{background:var(--gold-soft);}
table.list tbody tr.attn:hover{background:color-mix(in srgb,var(--gold-soft) 80%,var(--text));}
.t-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-meta{font-size:11.5px;color:var(--text-muted);display:flex;gap:6px;align-items:center;margin-top:3px;}
.grip{color:var(--text-subtle);cursor:grab;display:flex;}
.grip svg{width:15px;height:15px;}
.score{font-weight:600;font-variant-numeric:tabular-nums;}
.due{font-size:11px;padding:1px 7px;border-radius:var(--r-sm);font-weight:500;}
.due.soon{background:var(--red-soft);color:var(--red-content);}
.due.mid{background:var(--amber-soft);color:var(--amber-content);}
.due.far{background:var(--bg-subtle);color:var(--text-muted);}

/* ---------- detail ---------- */
.detail{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;}
@media(max-width:900px){.detail{grid-template-columns:1fr;}}
.field-row{display:flex;flex-direction:column;gap:3px;padding:11px 0;border-bottom:1px solid var(--border);}
.field-row .k{font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--text-subtle);}
.field-row .v{font-size:13.5px;}
.lock{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-subtle);
  background:var(--bg-subtle);padding:1px 6px;border-radius:var(--r-xs);}
.timeline{position:relative;padding-left:18px;}
.timeline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border);}
.tl{position:relative;padding:0 0 16px 4px;}
.tl::before{content:"";position:absolute;left:-17px;top:3px;width:10px;height:10px;border-radius:50%;
  background:var(--brand);box-shadow:0 0 0 3px var(--surface);}
.tl.muted::before{background:var(--g300);}
.tl .when{font-size:11px;color:var(--text-subtle);}
.tl .what{font-size:13px;}
.tl .who2{font-size:11.5px;color:var(--text-muted);}

/* version stack */
.vstack{display:flex;flex-direction:column;gap:8px;}
.vrow{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--border);
  border-radius:var(--r-sm);background:var(--bg-muted);}
.vthumb{width:46px;height:46px;border-radius:var(--r-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:600;}
.vrow .meta{flex:1;min-width:0;}
.vrow .meta b{font-size:13px;}
.vrow .meta span{font-size:11.5px;color:var(--text-muted);display:block;}

/* approval */
.appr{border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;margin-bottom:10px;}
.appr.locked{border-color:var(--amber);background:var(--amber-soft);}
.appr .top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.lockbar{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:var(--r-sm);
  background:var(--amber-soft);color:var(--amber-content);font-size:12.5px;margin:12px 0;}
.lockbar.open{background:var(--green-soft);color:var(--green-content);}

/* intake */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:680px){.form-grid{grid-template-columns:1fr;}}
.fg-full{grid-column:1/-1;}
.autofill{background:var(--bg-subtle);border:1px dashed var(--border-strong);border-radius:var(--r-sm);padding:13px 15px;}
.autofill .row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:13px;}
.autofill .row .k{color:var(--text-muted);}
.chip{display:inline-block;font-size:11.5px;background:var(--brand-soft);color:var(--brand-content);
  padding:2px 9px;border-radius:var(--r-sm);margin:2px 3px 0 0;}
.segmented{display:inline-flex;border:1px solid var(--border-strong);border-radius:var(--r-sm);overflow:hidden;}
.segmented button{border:none;background:var(--surface);padding:7px 14px;font-size:13px;color:var(--text-muted);}
.segmented button.on{background:var(--brand);color:#fff;}

/* media / clips */
.clipgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.clip{border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;background:var(--surface);
  display:flex;flex-direction:column;transition:box-shadow var(--ease) .15s,border-color var(--ease) .15s;}
.clip:hover{box-shadow:var(--sh-2);border-color:var(--brand-border);}
.clip .cap{height:128px;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-strong) 100%);
  display:flex;align-items:center;justify-content:center;position:relative;color:#fff;}
.clip .cap .ts{position:absolute;bottom:8px;left:8px;font-size:11px;font-weight:600;background:rgba(0,0,0,.45);
  color:#fff;padding:2px 8px;border-radius:var(--r-xs);}
.clip .cap .vir{position:absolute;top:8px;right:8px;font-size:11px;font-weight:700;background:var(--gold);
  color:#3b2a00;padding:2px 9px;border-radius:var(--r-full);}
.clip .body{padding:13px;display:flex;flex-direction:column;gap:8px;flex:1;}
.clip .hk{font-size:13.5px;font-weight:600;line-height:1.35;}
.clip .desc{font-size:12px;color:var(--text-muted);line-height:1.45;}
.clip .foot{display:flex;gap:7px;margin-top:auto;}
.assetcard{border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;background:var(--surface);}
.assetcard .cap{height:120px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;}
.assetcard .body{padding:12px;}

/* media list */
.mrow{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--border);border-radius:var(--r-md);
  background:var(--surface);cursor:pointer;transition:border-color var(--ease) .12s,box-shadow var(--ease) .12s;}
.mrow:hover{border-color:var(--brand-border);box-shadow:var(--sh-1);}
.mrow .thumb{width:74px;height:48px;border-radius:var(--r-sm);background:#000;flex-shrink:0;display:flex;
  align-items:center;justify-content:center;color:#fff;}

/* performance */
.insight{display:flex;gap:12px;padding:14px;border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);}
.insight .ico{width:34px;height:34px;border-radius:var(--r-sm);background:var(--green-soft);color:var(--green-content);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.insight.warn .ico{background:var(--gold-soft);color:var(--gold-content);}
.metric-big{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;font-family:var(--font-display);letter-spacing:-.02em;}
.spark{display:block;}

/* AI panel */
.ai-fab{position:fixed;right:22px;bottom:22px;z-index:50;display:flex;align-items:center;gap:9px;
  padding:12px 18px;border-radius:var(--r-full);background:var(--brand);color:#fff;border:none;
  box-shadow:var(--sh-2);font-size:13.5px;font-weight:600;cursor:pointer;}
.ai-fab:hover{background:var(--brand-bright);}
.ai-fab .spk{width:8px;height:8px;border-radius:50%;background:var(--gold);}
.ai-panel{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:92vw;background:var(--surface);
  border-left:1px solid var(--border);box-shadow:var(--sh-3);z-index:60;transform:translateX(100%);
  transition:transform var(--ease) .28s;display:flex;flex-direction:column;}
.ai-panel.open{transform:translateX(0);}
.ai-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.ai-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:90%;padding:10px 13px;border-radius:var(--r-md);font-size:13px;line-height:1.5;}
.msg.u{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:4px;}
.msg.a{align-self:flex-start;background:var(--bg-subtle);border-bottom-left-radius:4px;}
.msg.a .prop{margin-top:9px;display:flex;gap:7px;}
.ai-foot{padding:13px 16px;border-top:1px solid var(--border);}
.suggest{display:flex;flex-wrap:wrap;gap:6px;}
.suggest button{font-size:12px;padding:6px 11px;border:1px solid var(--border-strong);border-radius:var(--r-full);
  background:var(--surface);color:var(--text-muted);}
.suggest button:hover{background:var(--bg-subtle);color:var(--text);}

/* role switch */
.rsw{position:relative;}
.rsw .cur{display:flex;align-items:center;gap:8px;padding:6px 11px;border:1px solid var(--border-strong);
  border-radius:var(--r-sm);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;}
.rsw .cur .rdot{width:7px;height:7px;border-radius:50%;background:var(--brand);}
.rsw-menu{position:absolute;top:calc(100% + 6px);right:0;width:248px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-md);box-shadow:var(--sh-2);padding:6px;z-index:40;display:none;}
.rsw-menu.open{display:block;}
.rsw-menu button{display:flex;gap:10px;width:100%;text-align:left;padding:9px 10px;border:none;background:transparent;
  border-radius:var(--r-sm);color:var(--text);}
.rsw-menu button:hover{background:var(--bg-subtle);}
.rsw-menu .nm{font-size:13px;font-weight:600;}
.rsw-menu .ds{font-size:11.5px;color:var(--text-muted);}
.icobtn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:var(--r-sm);
  border:1px solid var(--border-strong);background:var(--surface);color:var(--text-muted);cursor:pointer;}
.icobtn:hover{background:var(--bg-subtle);color:var(--text);}
.icobtn svg{width:18px;height:18px;}

/* toast */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;
  flex-direction:column;gap:8px;align-items:center;}
.toast{display:flex;align-items:center;gap:9px;background:var(--g700);color:#fff;padding:11px 16px;border-radius:var(--r-md);
  box-shadow:var(--sh-2);font-size:13px;font-weight:500;animation:pop .25s var(--ease);}
[data-theme="dark"] .toast{background:var(--surface-2);border:1px solid var(--border-strong);}
.toast svg{width:16px;height:16px;color:var(--gold);}
@keyframes pop{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(20,10,30,.45);z-index:70;display:flex;align-items:center;
  justify-content:center;padding:20px;animation:fade .15s ease;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-3);width:100%;max-width:520px;
  max-height:88vh;overflow-y:auto;border:1px solid var(--border);}
.modal .mh{padding:17px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal .mb{padding:20px;}
.modal .mf{padding:15px 20px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end;}

/* tour */
.tour{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:75;background:var(--brand);color:#fff;
  border-radius:var(--r-md);box-shadow:var(--sh-3);padding:14px 18px;width:min(440px,92vw);}
.tour .step{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;opacity:.8;}
.tour h4{font-size:15px;margin:3px 0 5px;}
.tour p{font-size:13px;margin:0 0 12px;opacity:.92;line-height:1.45;}
.tour .row{display:flex;gap:8px;align-items:center;}
.tour .btn{background:#fff;color:var(--brand);border-color:#fff;}
.tour .btn.ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.4);}
.tour .prog{margin-left:auto;font-size:12px;opacity:.85;font-variant-numeric:tabular-nums;}

.empty{text-align:center;padding:42px 20px;color:var(--text-subtle);font-size:13px;}
.muted{color:var(--text-muted);} .subtle{color:var(--text-subtle);}
.stack{display:flex;flex-direction:column;gap:14px;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;} @media(max-width:680px){.grid2{grid-template-columns:1fr;}}
.divider{height:1px;background:var(--border);margin:4px 0;}
.banner{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;border-radius:var(--r-md);font-size:13px;line-height:1.5;}
.banner.future{background:var(--brand-soft);color:var(--brand-content);}
.banner svg{width:18px;height:18px;flex-shrink:0;margin-top:1px;}
.future-tag{font-size:10px;font-weight:700;letter-spacing:.04em;background:var(--brand-soft);color:var(--brand-content);
  padding:2px 7px;border-radius:var(--r-xs);text-transform:uppercase;}
.live-tag{font-size:10px;font-weight:700;letter-spacing:.04em;background:var(--green-soft);color:var(--green-content);
  padding:2px 7px;border-radius:var(--r-xs);text-transform:uppercase;}

@media(max-width:820px){
  .side{position:fixed;left:0;top:0;z-index:90;transform:translateX(-100%);transition:transform var(--ease) .25s;}
  .side.show{transform:none;}
  .detail{grid-template-columns:1fr;}
  .topbar{padding:10px 14px;} .content{padding:18px 14px 60px;}
}
.menu-btn{display:none;}
@media(max-width:820px){.menu-btn{display:inline-flex;}}

/* ===== atmosphere (quiet brand ground) ===== */
#atmo{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(60vw 50vh at 78% -8%, color-mix(in srgb,var(--brand) 14%,transparent), transparent 60%),
    radial-gradient(46vw 40vh at -6% 8%, color-mix(in srgb,var(--brand) 9%,transparent), transparent 55%),
    radial-gradient(40vw 45vh at 60% 108%, color-mix(in srgb,var(--gold) 6%,transparent), transparent 60%);
  background-attachment:fixed;animation:drift 26s var(--ease) infinite alternate;}
@keyframes drift{to{background-position:4% 3%, -3% -2%, 2% -3%;}}

/* ===== motion ===== */
@keyframes viewIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes riseIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.content.swap{animation:viewIn .34s var(--ease) both;}
.reveal{animation:riseIn .5s var(--ease) both;animation-delay:calc(var(--i,0)*55ms);}
.kpi,.insight,.assetcard,.clip,.mrow{animation:riseIn .5s var(--ease) both;animation-delay:calc(var(--i,0)*45ms);}
table.list tbody tr{animation:fadeIn .4s var(--ease) both;animation-delay:calc(var(--i,0)*30ms + .1s);}
.card{transition:box-shadow var(--ease) .18s,transform var(--ease) .18s,border-color var(--ease) .18s;}
.kpi{transition:box-shadow var(--ease) .18s,transform var(--ease) .18s,border-color var(--ease) .18s;}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:var(--brand-border);}
.assetcard:hover,.mrow:hover{transform:translateY(-2px);}
.btn:hover{transform:translateY(-1px);} .btn:active{transform:translateY(.5px);}
.spark .sl{stroke-dasharray:1;stroke-dashoffset:1;animation:draw 1.1s var(--ease) .15s forwards;}
.spark .sa{opacity:0;animation:fadeIn .9s var(--ease) .5s forwards;}
.spark .sc{opacity:0;animation:fadeIn .3s ease 1.1s forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}

/* ===== living data: funnel + capacity ===== */
.datarow{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:760px){.datarow{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:15px 17px;box-shadow:var(--sh-1);}
.panel h4{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:13px;}
.funnel{display:flex;flex-direction:column;gap:9px;}
.fstage{display:grid;grid-template-columns:96px 1fr 30px;align-items:center;gap:10px;font-size:12.5px;}
.fstage .nm{color:var(--text-muted);}
.fbar-wrap{height:14px;background:var(--bg-subtle);border-radius:var(--r-full);overflow:hidden;}
.fbar{height:100%;width:0;border-radius:var(--r-full);transition:width 1s var(--ease);}
.fstage .ct{text-align:right;font-weight:700;font-family:var(--font-display);font-variant-numeric:tabular-nums;}
.cap-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:12.5px;}
.cap-row .who{width:104px;flex-shrink:0;}
.cap-bar-wrap{flex:1;height:8px;background:var(--bg-subtle);border-radius:var(--r-full);overflow:hidden;}
.cap-bar{height:100%;width:0;border-radius:var(--r-full);transition:width .9s var(--ease);}
.cap-row .n{width:30px;text-align:right;color:var(--text-muted);font-variant-numeric:tabular-nums;}

/* ===== cover / hero ===== */
#cover{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  background:
    radial-gradient(70vw 60vh at 80% -10%, color-mix(in srgb,var(--brand) 24%,transparent), transparent 60%),
    radial-gradient(55vw 50vh at -8% 110%, color-mix(in srgb,var(--gold) 10%,transparent), transparent 55%),
    var(--bg-muted);
  overflow:hidden;}
#cover.hide{animation:coverOut .5s var(--ease) forwards;}
@keyframes coverOut{to{opacity:0;transform:scale(1.02);visibility:hidden;}}
#cover .dotgrid{position:absolute;inset:0;opacity:.5;

function tierClass(t){return t==='high'?'high':t==='mid'?'mid':t==='soc'?'soc':'low';}
function avatar(id,big){const e=emp(id); if(!e)return ''; const sz=big?'width:30px;height:30px;font-size:11px':'';return `<span class="avatar" style="${sz}">${e.i}</span>`;}
function who(id){const e=emp(id);if(!e)return '<span class="subtle">—</span>';return `<span class="who">${avatar(id)}${e.n}</span>`;}
function badge(tone,txt){return `<span class="badge b-${tone}"><span class="dot"></span>${txt}</span>`;}
function tsBadge(s){return badge(TSTATUS_TONE[s]||'neutral',s);}
function psBadge(s){return badge(PSTATUS_TONE[s]||'brand',s);}
function dueChip(d){if(d<0)return `<span class="due far">shipped</span>`;const c=d<=2?'soon':d<=6?'mid':'far';return `<span class="due ${c}">due ${d}d</span>`;}
function tierBadge(tid){const t=at(tid),e=EVENTS[t.event];return `<span class="tier ${tierClass(e.tier)}">${e.n}</span>`;}
function fmtFuture(){return `<span class="future-tag">Future</span>`;}
function fmtLive(){return `<span class="live-tag">Live today</span>`;}

function toast(msg,icon){const w=$('#toasts');const t=document.createElement('div');t.className='toast';
  t.innerHTML=`${svg(icon||'check',16)}<span>${msg}</span>`;w.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2600);}

let SPARKID=0;
function sparkline(series,w,h,color){
  const mn=Math.min(...series),mx=Math.max(...series),sp=mx-mn||1;
  const pts=series.map((v,i)=>[i/(series.length-1)*w,h-((v-mn)/sp)*(h-6)-3]);
  const line=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area=`${line} L${w} ${h} L0 ${h} Z`;const c=color||'var(--green)';
  const last=pts[pts.length-1];const id='sg'+(++SPARKID);
  const grid=[0.5].map(f=>`<line x1="0" y1="${(h*f).toFixed(1)}" x2="${w}" y2="${(h*f).toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2 4"/>`).join('');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="${c}" stop-opacity=".22"/><stop offset="1" stop-color="${c}" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path class="sa" d="${area}" fill="url(#${id})"/>
    <path class="sl" d="${line}" pathLength="1" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle class="sc" cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.8" fill="${c}"/></svg>`;
}

function funnelCapacity(){
  const stages=[
    {n:'Requested',c:'var(--blue)',f:t=>['Backlog','To Do'].includes(t.ts)},
    {n:'In production',c:'var(--amber)',f:t=>['In Progress','In Revision'].includes(t.ts)},
    {n:'In review',c:'var(--brand)',f:t=>t.ts==='Review'},
    {n:'Published',c:'var(--green)',f:t=>t.ts==='Done'}
  ].map(s=>({...s,ct:TICKETS.filter(s.f).length}));
  const mx=Math.max(...stages.map(s=>s.ct),1);
  const funnel=stages.map(s=>`<div class="fstage"><span class="nm">${s.n}</span>
    <div class="fbar-wrap"><div class="fbar" data-w="${Math.round(s.ct/mx*100)}" style="background:${s.c}"></div></div>
    <span class="ct">${s.ct}</span></div>`).join('');
  const eds=Object.values(EMP).filter(e=>e.id!=='nina');
  const cap=eds.map(e=>{const load=TICKETS.filter(t=>t.assignee===e.id&&t.ts!=='Done').length;
    const pct=Math.min(load/4*100,100);const col=load>=4?'var(--red)':load>=3?'var(--amber)':'var(--green)';
    return `<div class="cap-row"><span class="who">${avatar(e.id)}${e.n}</span>
      <div class="cap-bar-wrap"><div class="cap-bar" data-w="${pct}" style="background:${col}"></div></div>
      <span class="n">${load}/4</span></div>`;}).join('');
  return `<div class="datarow">
    <div class="panel"><h4>Lifecycle funnel ${fmtFuture()}</h4><div class="funnel">${funnel}</div></div>
    <div class="panel"><h4>Editor capacity ${fmtFuture()}</h4>${cap}</div></div>`;
}

function shootMatches(s,f){
  if(f.view==='studio'){ if(!(s.created>'2026-05-31' && s.filmDate)) return false; }
  if(f.status && s.status!==f.status) return false;

const reduceMotion=()=>window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function countUp(el){
  const m=String(el.textContent).match(/^([^\d-]*)(-?[\d.]+)(.*)$/); if(!m)return;
  const pre=m[1],target=parseFloat(m[2]),suf=m[3],dec=(m[2].split('.')[1]||'').length;
  const dur=680,t0=performance.now();
  function step(t){const p=Math.min((t-t0)/dur,1);const e=1-Math.pow(1-p,3);
    el.textContent=pre+(target*e).toFixed(dec)+suf; if(p<1)requestAnimationFrame(step);}
  el.textContent=pre+(0).toFixed(dec)+suf; requestAnimationFrame(step);
}
function postRender(){
  const v=$('#view'); v.classList.remove('swap'); void v.offsetWidth; v.classList.add('swap');
  v.querySelectorAll('.kpi,.insight,.assetcard,.clip,.mrow').forEach((el,i)=>el.style.setProperty('--i',i));
  v.querySelectorAll('table.list tbody tr').forEach((el,i)=>el.style.setProperty('--i',Math.min(i,12)));
  if(!reduceMotion()) v.querySelectorAll('.kpi .val,.metric-big').forEach(countUp);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    v.querySelectorAll('.fbar,.cap-bar').forEach(b=>{b.style.width=(b.dataset.w||0)+'%';});}));
}
function route(){
  let h=location.hash;
  if(!h||h==='#/'){ showCover(); h='#/queue'; } else hideCover();
  renderSide();
  if(h.startsWith('#/ticket/')) vTicket(h.split('/')[2]);

  else { const map={'#/studio':vStudio,'#/queue':vQueue,'#/editor':vEditor,'#/stakeholder':vStakeholder,
    '#/intake':vNewRequest,'#/intake/creative':vIntakeCreative,'#/intake/shoot':vIntakeShoot,
    '#/assets':vAssets,'#/media':vMedia,'#/shoots':vShoots,'#/performance':vPerformance,'#/rules':vRules}; (map[h]||vQueue)(); }
  postRender();
  window.scrollTo(0,0);
  $('#side').classList.remove('show');
}

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  // close role menu on outside click
  if(STATE.roleMenu && !e.target.closest('.rsw')){STATE.roleMenu=false;route();}
  if(!el)return;
  const a=el.dataset.action;
  if(el.dataset.stop){e.stopPropagation();}
  switch(a){
    case 'nav': location.hash=el.dataset.route; break;
    case 'cover': location.hash='#/'; break;
    case 'enter': hideCover(); STATE.role='manager'; location.hash='#/queue'; route(); break;
    case 'enter-role': STATE.role=el.dataset.role; hideCover(); location.hash=ROLES[STATE.role].home; route();
      toast(`Entered as ${ROLES[STATE.role].n}`,'user'); break;
    case 'cover-tour': hideCover(); window.__tour=0; renderTour(); break;
    case 'menu': $('#side').classList.toggle('show'); break;
    case 'theme': STATE.theme=STATE.theme==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',STATE.theme); route(); break;
    case 'role-menu': STATE.roleMenu=!STATE.roleMenu; route(); break;
    case 'set-role': STATE.role=el.dataset.role; STATE.roleMenu=false; location.hash=ROLES[STATE.role].home; route();
      toast(`Now viewing as ${ROLES[STATE.role].n}`,'user'); break;

    case 'open-media': location.hash='#/media/'+el.dataset.id; break;
    case 'open-shoot': location.hash='#/shoot/'+el.dataset.id; break;
    case 'toast': toast(el.dataset.msg||'Done'); break;
    case 'assign': openAssign(el.dataset.id); break;
    case 'scrim': if(e.target.classList.contains('scrim'))closeModal(); break;
    case 'modal-close': closeModal(); break;
    case 'approve': doApprove(el.dataset.id,+el.dataset.i,true); break;

    case 'shoot-view': STATE.shootView.view=el.dataset.view; if(el.dataset.view!=='custom'){STATE.shootView.status='';STATE.shootView.format='';STATE.shootView.hasDate='';} vShoots(); break;
    case 'submit-shoot': submitShoot(); break;
    case 'draft-brief': $('#f-brief').value="Open on the transformation promise (top-performing hook for this asset type), intercut testimonial b-roll, and land the enrolment CTA before 0:75. Mirror the 9:16 cold cut that beat the set by 40% CTR."; toast('Brief drafted from top performers','sparkle'); break;
    case 'submit-intake': submitIntake(); break;
    case 'submit-media': openSubmitMedia(); break;
    case 'create-media': createMedia(); break;
    case 'suggest-clips': suggestClips(el.dataset.id); break;
    case 'clip-approve': setClip(el.dataset.m,el.dataset.c,'approved'); break;
    case 'clip-dismiss': setClip(el.dataset.m,el.dataset.c,'dismissed'); break;
    case 'clip-undo': setClip(el.dataset.m,el.dataset.c,'proposed'); break;
    case 'convert': doConvert(el.dataset.id); break;
    case 'ai-open': renderAI(true); break;
    case 'ai-close': $('#aipanel').classList.remove('open'); break;
    case 'ai-ask': aiAsk(el.dataset.q); break;
    case 'tour-start': window.__tour=0; renderTour(); break;
    case 'tour-next': if(window.__tour<TOUR.length-1){window.__tour++;renderTour();}else{endTour();} break;
    case 'tour-prev': if(window.__tour>0){window.__tour--;renderTour();} break;
    case 'tour-end': endTour(); break;
  }
});
document.addEventListener('change',e=>{
  const el=e.target.closest('[data-action]'); if(!el)return;
  const a=el.dataset.action,id=el.dataset.id;
  if(a==='set-ts'){const t=TICKETS.find(x=>x.id===id);t.ts=el.value;toast(`Ticket status → ${el.value}`);route();}
  if(a==='set-ps'){const t=TICKETS.find(x=>x.id===id);t.ps=el.value;toast(`Priority status → ${el.value}`);route();}
  if(a==='set-assignee'){const t=TICKETS.find(x=>x.id===id);t.assignee=el.value||null;toast(t.assignee?`Assigned to ${emp(t.assignee).n}`:'Unassigned');route();}
  if(a==='intake-event'){renderAutofill();}
  if(a==='intake-asset'){renderLockbox(el.value);}
  if(a==='shoot-filter'){STATE.shootView[el.dataset.k]=el.value; vShoots();}
});

function doApprove(id,i,ok){const t=TICKETS.find(x=>x.id===id);const ap=t.approvals[i];
  if(ok){ap.state='approved';ap.by='Nina R.';t.audit.unshift({w:`${ap.who} approved`,who:'Nina R.',t:'just now'});toast(`${ap.who} approval granted`,'check');}
  else{ap.state='changes';ap.by='Nina R.';ap.note='Please address the noted change and re-submit.';t.ts='In Revision';t.audit.unshift({w:'Changes requested',who:'Nina R.',t:'just now'});toast('Changes requested — back to editor');}
  route();}
function doPublish(id){const t=TICKETS.find(x=>x.id===id);t.ts='Done';t.ps='Published';t.dist=t.dist||'https://instagram.com/p/new-publish';
  if(!t.perf)t.perf={ctr:2.8,roas:3.6,views:'0',series:spk().map(v=>v*0.4)};
  t.audit.unshift({w:'Published',who:emp(ROLES[STATE.role].emp||'nina').n,t:'just now'});closeModal();toast('Published — performance tracking started','check');route();}

function submitIntake(){const ek=$('#f-event').value,ak=$('#f-asset').value,title=$('#f-title').value.trim();
  if(!ek||!ak||!title){toast('Fill event type, asset type and title','x');return;}
  const a=at(ak);const id='t-0'+(++TID);
  TICKETS.push({id,title,at:ak,assignee:null,ts:'Backlog',ps:'New Request',score:+(0.4+Math.abs(Math.sin(TID))*0.5).toFixed(2),
    due:9,aud:document.querySelector('#f-aud .on').dataset.v,brief:$('#f-brief').value||'(brief pending)',cta:$('#f-cta').value||'—',
    pos:$('#f-pos').value||'—',dist:'',rank:TICKETS.length+1,assets:[],approvals:a.type==='Video'?[{who:'Brand',state:'pending'}]:[],perf:null,
    audit:[{w:'Request created',who:'Intake',t:'just now',m:1}]});
  modal(`<div class="modal"><div class="mb" style="text-align:center;padding:36px 24px">
      <div style="width:50px;height:50px;border-radius:50%;background:var(--green-soft);color:var(--green-content);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">${svg('check',24)}</div>

function submitShoot(){const req=$('#s-req').value,title=$('#s-title').value.trim();
  if(!req||!title){toast('Fill your name and a title','x');return;}

function suggestClips(id){const m=MEDIA.find(x=>x.id===id);m.status='Clips Suggested';
  if(!m.clips.length)m.clips=[
    {id:'n1',hk:'The one belief that quietly runs your life',ts:'06:40–07:18',vir:8,fmt:'talking_head',desc:'Strong cold-reach hook with a clean open loop.',state:'proposed'},
    {id:'n2',hk:'Try this before your next hard decision',ts:'15:10–15:44',vir:7,fmt:'quote_card',desc:'Actionable, high save-rate framing.',state:'proposed'},
    {id:'n3',hk:'Why motivation is the wrong tool',ts:'28:02–28:40',vir:7,fmt:'broll_overlay',desc:'Counter-intuitive, pairs well with b-roll.',state:'proposed'}];
  toast('Clip strategy generated','sparkle');route();}

function setClip(mid,cid,state){const m=MEDIA.find(x=>x.id===mid);const c=m.clips.find(x=>x.id===cid);c.state=state;
  toast(state==='approved'?'Clip approved':state==='dismissed'?'Clip dismissed':'Clip restored');route();}

function doConvert(id){const m=MEDIA.find(x=>x.id===id);const sel=m.clips.filter(c=>c.state==='approved');if(!sel.length)return;
  sel.forEach(c=>{const nid='t-0'+(++TID);
    TICKETS.push({id:nid,title:c.hk.slice(0,42),at:'social_reel',assignee:null,ts:'Backlog',ps:'New Request',score:+(0.5+c.vir/20).toFixed(2),
      due:10,aud:'Warm',brief:`Clip from “${m.title}” (${c.ts}). ${c.desc}`,cta:'Watch the full talk',pos:`Social cutdown · ${c.fmt}`,dist:'',
      rank:TICKETS.length+1,assets:[],approvals:[{who:'Brand',state:'pending'}],perf:null,
      audit:[{w:`Converted from clip · ${m.title}`,who:'Clip engine',t:'just now',m:1}]});
    c.state='converted';});
  m.clips=m.clips.filter(c=>c.state!=='converted');
  modal(`<div class="modal"><div class="mb" style="text-align:center;padding:34px 24px">
    <div style="width:50px;height:50px;border-radius:50%;background:var(--green-soft);color:var(--green-content);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">${svg('check',24)}</div>
